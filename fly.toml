app = "stealth-relay"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  STEALTH_SERVER__WS_BIND = "0.0.0.0:9090"
  STEALTH_SERVER__METRICS_BIND = "0.0.0.0:9091"
  STEALTH_LOGGING__LEVEL = "info"
  STEALTH_LOGGING__FORMAT = "json"

[http_service]
  internal_port = 9090
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

[[services]]
  protocol = "tcp"
  internal_port = 9091

  [[services.ports]]
    port = 9091
    handlers = ["http"]

  [[services.http_checks]]
    interval = 30000
    grace_period = "10s"
    method = "get"
    path = "/health"
    protocol = "http"
    timeout = 5000

[mounts]
  source = "stealth_keys"
  destination = "/var/stealth-relay/keys"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
